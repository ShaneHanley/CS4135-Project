services:
  discovery-service:
    image: ${DOCKER_ORG}/cs4135-project-discovery-service:latest
    build: ./infrastructure/discovery-service
    ports:
      - "8761:8761"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  config-server:
    image: ${DOCKER_ORG}/cs4135-project-config-server:latest
    build: ./infrastructure/config-server
    ports:
      - "8888:8888"
    env_file: .env
    environment:
      CONFIG_REPO_PATH: file:/config-repo
    volumes:
      - ./infrastructure/config-repo:/config-repo:ro
    depends_on:
      - discovery-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  gateway-service:
    image: ${DOCKER_ORG}/cs4135-project-gateway-service:latest
    build: ./infrastructure/gateway-service
    ports:
      - "8080"
    env_file: .env
    environment:
      AUTH_SERVICE_URL: lb://auth-service
      PRESCRIPTION_SERVICE_URL: lb://prescription-service
      PHARMACY_SERVICE_URL: lb://pharmacy-service
      PATIENT_SERVICE_URL: http://patient-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      BILLING_SERVICE_URL: http://billing-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - discovery-service
      - config-server
      - auth-service
      - prescription-service
      - pharmacy-service
      - patient-service
      - inventory-service
      - billing-service
      - analytics-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M

  auth-service:
    image: ${DOCKER_ORG}/cs4135-project-auth-service:latest
    build: ./infrastructure/auth-service
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - discovery-service
      - config-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  prescription-service:
    image: ${DOCKER_ORG}/cs4135-project-prescription-service:latest
    build:
      context: .
      dockerfile: services/prescription-service/Dockerfile
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - discovery-service
      - config-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  pharmacy-service:
    image: ${DOCKER_ORG}/cs4135-project-pharmacy-service:latest
    build:
      context: .
      dockerfile: services/pharmacy-service/Dockerfile
    ports:
      - "8083:8083"
    env_file: .env
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - discovery-service
      - config-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  patient-service:
    image: ${DOCKER_ORG}/cs4135-project-patient-service:latest
    build:
      context: .
      dockerfile: services/patient-service/Dockerfile
    ports:
      - "8084:8084"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  inventory-service:
    image: ${DOCKER_ORG}/cs4135-project-inventory-service:latest
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8085:8085"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  billing-service:
    image: ${DOCKER_ORG}/cs4135-project-billing-service:latest
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    ports:
      - "8086:8086"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  analytics-service:
    image: ${DOCKER_ORG}/cs4135-project-analytics-service:latest
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    ports:
      - "8087:8087"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  notification-service:
    image: ${DOCKER_ORG}/cs4135-project-notification-service:latest
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8088:8080"
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: ${SUPABASE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_DB_PASSWORD}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - discovery-service
      - config-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    stop_grace_period: 30s

  web-frontend:
    image: ${DOCKER_ORG}/cs4135-project-web-frontend:latest
    build: ./web-frontend
    ports:
      - "3000:80"
    env_file: .env
    depends_on:
      - gateway-service
