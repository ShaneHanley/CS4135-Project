spring:
  datasource:
    url: jdbc:h2:mem:pharmacytest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.default_schema: pharmacy_svc
  flyway:
    enabled: false
