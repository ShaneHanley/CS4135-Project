server:
  port: 8080
app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
spring:
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  application:
    name: gateway-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  cloud:
    gateway:
      mvc:
        default-filters:
          - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        routes:
          - id: auth
            uri: ${AUTH_SERVICE_URL:lb://auth-service}
            predicates: [ Path=/api/auth/** ]
          - id: doctor
            uri: ${PRESCRIPTION_SERVICE_URL:lb://prescription-service}
            predicates: [ Path=/api/doctor/** ]
          - id: pharmacy
            uri: ${PHARMACY_SERVICE_URL:lb://pharmacy-service}
            predicates: [ Path=/api/pharmacy/** ]
          - id: patients
            uri: ${PATIENT_SERVICE_URL:lb://patient-service}
            predicates: [ Path=/api/patients/** ]
          - id: inventory
            uri: ${INVENTORY_SERVICE_URL:lb://inventory-service}
            predicates: [ Path=/api/inventory/** ]
          - id: billing
            uri: ${BILLING_SERVICE_URL:lb://billing-service}
            predicates: [ Path=/api/billing/** ]
          - id: analytics
            uri: ${ANALYTICS_SERVICE_URL:lb://analytics-service}
            predicates: [ Path=/api/analytics/** ]
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka}
resilience4j:
  circuitbreaker:
    instances:
      doctorCircuitBreaker:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      pharmacyCircuitBreaker:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      doctorCircuitBreaker:
        timeoutDuration: 2s
      pharmacyCircuitBreaker:
        timeoutDuration: 2s
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
