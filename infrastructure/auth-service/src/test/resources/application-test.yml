spring:
  datasource:
    url: jdbc:h2:mem:authtest;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:h2-init.sql'
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.default_schema: auth_svc
  flyway:
    enabled: false

jwt:
  access-token-ttl-seconds: 900
  refresh-token-ttl-seconds: 604800

app:
  cors:
    allowed-origins: http://localhost:3000
