server:
  port: 8081

jwt:
  access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL:900}
  refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL:604800}

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: auth_svc
  flyway:
    enabled: true
    url: ${SUPABASE_MIGRATION_URL}
    user: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    schemas: auth_svc
    default-schema: auth_svc
    locations: classpath:db/migration
