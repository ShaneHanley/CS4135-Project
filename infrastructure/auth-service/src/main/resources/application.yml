server:
  port: 8081

jwt:
  access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL:900}
  refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL:604800}

app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

spring:
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-server:8888}
  application:
    name: auth-service
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    hikari:
      maximum-pool-size: 3
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: auth_svc
  flyway:
    enabled: true
    url: ${SUPABASE_MIGRATION_URL}
    user: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    schemas: auth_svc
    default-schema: auth_svc
    locations: classpath:db/migration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka}
