server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: auth_svc
  flyway:
    enabled: true
    url: ${SUPABASE_MIGRATION_URL}
    user: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    schemas: auth_svc
    default-schema: auth_svc
    locations: classpath:db/migration
