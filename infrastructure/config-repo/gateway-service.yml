eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-service:8761/eureka}

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth
            uri: ${AUTH_SERVICE_URL:lb://auth-service}
            predicates: [ Path=/api/auth/** ]
          - id: doctor
            uri: ${PRESCRIPTION_SERVICE_URL:lb://prescription-service}
            predicates: [ Path=/api/doctor/** ]
          - id: pharmacy
            uri: ${PHARMACY_SERVICE_URL:lb://pharmacy-service}
            predicates: [ Path=/api/pharmacy/** ]
